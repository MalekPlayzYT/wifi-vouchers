<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmed | Contact Info</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* Minimalist Dark Mode Theme */
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #141414;
            --text-main: #f5f5f5;
            --text-muted: #a3a3a3;
            --border-color: #262626;
            --hover-bg: #1f1f1f;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }

        /* Sleek Card Container */
        .card {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 380px;
            border-radius: 24px;
            padding: 40px 24px;
            border: 1px solid var(--border-color);
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        /* Profile Photo Area */
        .profile-img-container {
            width: 110px;
            height: 110px;
            margin: 0 auto 20px;
            border-radius: 50%;
            overflow: hidden;
            border: 1px solid var(--border-color);
            background-color: #1f1f1f; /* Placeholder background */
        }

        .profile-img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 4px;
            letter-spacing: -0.5px;
        }

        p.location {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 32px;
        }

        /* Contact Buttons */
        .contact-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .contact-btn {
            display: flex;
            align-items: center;
            padding: 16px;
            background-color: transparent;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            color: var(--text-main);
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.2s ease;
            cursor: pointer;
            width: 100%;
            text-align: left;
        }

        .contact-btn svg {
            width: 20px;
            height: 20px;
            margin-right: 16px;
            fill: var(--text-muted);
            flex-shrink: 0;
            transition: fill 0.2s ease;
        }

        .contact-btn:hover {
            background-color: var(--hover-bg);
            border-color: #404040;
        }

        .contact-btn:hover svg {
            fill: var(--text-main);
        }

        /* Primary "Save Contact" Button */
        .contact-btn.primary {
            background-color: var(--text-main);
            color: var(--bg-color);
            border-color: var(--text-main);
            justify-content: center;
            margin-top: 16px;
            font-weight: 600;
        }

        .contact-btn.primary svg {
            fill: var(--bg-color);
            margin-right: 8px;
        }

        .contact-btn.primary:hover {
            background-color: #d4d4d4;
        }

    </style>
</head>
<body>

    <div class="card">
        <div class="profile-img-container">
            <img src="./ahmed.jpeg" alt="Malek's Photo">
        </div>

        <h1>Ahmed Hamdi</h1>
        <p class="location">6th of October City, Egypt</p>

        <div class="contact-list">
            <a href="tel:+201289959901" class="contact-btn">
                <svg viewBox="0 0 24 24"><path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56a.977.977 0 00-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.66c.27-.28.35-.67.24-1.02-.37-1.11-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.01 21c.71 0 .99-.63.99-1.18v-3.45c0-.54-.45-.99-.99-.99z"/></svg>
                +201289959901
            </a>

            <a href="mailto:malekplayz123@gmail.com" class="contact-btn">
                <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
                ahmed.hamdi@samcrete.com
            </a>

            <button onclick="downloadVCard()" class="contact-btn primary">
                <svg viewBox="0 0 24 24"><path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm2 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
                Save Contact
            </button>
        </div>
    </div>

    <script>
        function downloadVCard() {
            const vcard = `BEGIN:VCARD
VERSION:3.0
FN:Ahmed
EMAIL:ahmed.hamdi@samcrete.com
TEL;TYPE=CELL:+201289959901
END:VCARD`;

            const blob = new Blob([vcard], { type: 'text/vcard' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'ahmed.vcf';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
